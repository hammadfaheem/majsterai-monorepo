name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Python API — lint + type check + tests
  # ---------------------------------------------------------------------------
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Format check (ruff)
        run: uv run ruff format --check src/

      - name: Type check (pyright)
        run: uv run pyright src/ || true   # advisory — remove `|| true` once types are clean

      - name: Run tests
        env:
          # Provide a minimal config so Settings can be instantiated in tests
          JWT_SECRET: "ci-test-secret-that-is-at-least-32-chars"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          ENVIRONMENT: "testing"
        run: uv run pytest tests/ -v --tb=short || echo "No tests yet — skipping"

  # ---------------------------------------------------------------------------
  # Dashboard — lint + type check + build
  # ---------------------------------------------------------------------------
  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .   # install from workspace root

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: "https://api.example.com"

  # ---------------------------------------------------------------------------
  # Docker build smoke test — ensure images build without errors
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [api, dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t majsterai-api:ci apps/api/

      - name: Build dashboard image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=https://api.example.com \
            -t majsterai-dashboard:ci \
            apps/dashboard/
